<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 800 500" font-family="Helvetica, Arial, sans-serif">
  <defs>
    <filter id="shadow" x="-2%" y="-2%" width="104%" height="104%">
      <feDropShadow dx="2" dy="2" stdDeviation="2" flood-opacity="0.15"/>
    </filter>
  </defs>
  
  <!-- Background -->
  <rect width="800" height="500" fill="#f8f9fa" rx="12"/>
  <text x="400" y="30" text-anchor="middle" font-size="18" font-weight="bold" fill="#1a1a2e">STEP 1: Power Supply Circuit</text>
  <text x="400" y="50" text-anchor="middle" font-size="12" fill="#666">USB-C PD Board → Voltage Regulators → Three Power Rails</text>
  
  <!-- USB-C PD Trigger Board -->
  <g transform="translate(50,80)" filter="url(#shadow)">
    <rect width="140" height="90" fill="#1a472a" rx="4" stroke="#0d2818" stroke-width="1.5"/>
    <!-- USB-C port -->
    <rect x="55" y="-8" width="30" height="12" fill="#888" rx="3" stroke="#555" stroke-width="1"/>
    <rect x="60" y="-6" width="20" height="8" fill="#333" rx="2"/>
    <!-- Screw terminals -->
    <rect x="15" y="65" width="22" height="18" fill="#4488ff" rx="2" stroke="#2255aa" stroke-width="1"/>
    <text x="26" y="78" text-anchor="middle" font-size="7" fill="white" font-weight="bold">V+</text>
    <rect x="45" y="65" width="22" height="18" fill="#333" rx="2" stroke="#111" stroke-width="1"/>
    <text x="56" y="78" text-anchor="middle" font-size="7" fill="white" font-weight="bold">GND</text>
    <!-- Label -->
    <text x="70" y="40" text-anchor="middle" font-size="9" fill="#8fbc8f" font-weight="bold">USB-C PD</text>
    <text x="70" y="52" text-anchor="middle" font-size="8" fill="#8fbc8f">Trigger Board</text>
    <text x="70" y="105" text-anchor="middle" font-size="10" fill="#333" font-weight="bold">Set to 12V output!</text>
  </g>
  
  <!-- RED wire from V+ -->
  <line x1="87" y1="163" x2="87" y2="210" stroke="#ff0000" stroke-width="3"/>
  <line x1="87" y1="210" x2="280" y2="210" stroke="#ff0000" stroke-width="3"/>
  <text x="180" y="203" text-anchor="middle" font-size="9" fill="#ff0000" font-weight="bold">RED = 12V</text>
  
  <!-- BLACK wire from GND -->
  <line x1="117" y1="163" x2="117" y2="230" stroke="#000" stroke-width="3"/>
  <line x1="117" y1="230" x2="650" y2="230" stroke="#000" stroke-width="3"/>
  <text x="400" y="245" text-anchor="middle" font-size="9" fill="#000" font-weight="bold">BLACK = Ground (GND) — connects to everything</text>
  
  <!-- 5V Regulator (AMS1117-5.0) -->
  <g transform="translate(280,170)" filter="url(#shadow)">
    <rect width="120" height="70" fill="#2d2d2d" rx="4" stroke="#111" stroke-width="1.5"/>
    <!-- Metal tab -->
    <rect x="20" y="-5" width="80" height="10" fill="#999" rx="2"/>
    <!-- Pins -->
    <rect x="20" y="65" width="8" height="16" fill="#ccc" rx="1"/>
    <rect x="56" y="65" width="8" height="16" fill="#ccc" rx="1"/>
    <rect x="92" y="65" width="8" height="16" fill="#ccc" rx="1"/>
    <text x="24" y="95" text-anchor="middle" font-size="7" fill="#666">IN</text>
    <text x="60" y="95" text-anchor="middle" font-size="7" fill="#666">GND</text>
    <text x="96" y="95" text-anchor="middle" font-size="7" fill="#666">OUT</text>
    <!-- Label -->
    <text x="60" y="30" text-anchor="middle" font-size="10" fill="#ff8c00" font-weight="bold">AMS1117</text>
    <text x="60" y="45" text-anchor="middle" font-size="12" fill="#ff8c00" font-weight="bold">5.0V</text>
    <!-- Capacitors -->
    <rect x="-20" y="20" width="14" height="24" fill="#c4a44a" rx="2" stroke="#8a7030" stroke-width="1"/>
    <text x="-13" y="60" text-anchor="middle" font-size="6" fill="#666">100nF</text>
    <rect x="126" y="20" width="14" height="24" fill="#c4a44a" rx="2" stroke="#8a7030" stroke-width="1"/>
    <text x="133" y="60" text-anchor="middle" font-size="6" fill="#666">100nF</text>
  </g>
  
  <!-- ORANGE wire from 5V reg output -->
  <line x1="376" y1="251" x2="376" y2="300" stroke="#ff8c00" stroke-width="3"/>
  <line x1="376" y1="300" x2="520" y2="300" stroke="#ff8c00" stroke-width="3"/>
  <text x="450" y="293" text-anchor="middle" font-size="9" fill="#ff8c00" font-weight="bold">ORANGE = 5V</text>
  
  <!-- 3.3V Regulator (AMS1117-3.3) -->
  <g transform="translate(520,260)" filter="url(#shadow)">
    <rect width="120" height="70" fill="#2d2d2d" rx="4" stroke="#111" stroke-width="1.5"/>
    <rect x="20" y="-5" width="80" height="10" fill="#999" rx="2"/>
    <rect x="20" y="65" width="8" height="16" fill="#ccc" rx="1"/>
    <rect x="56" y="65" width="8" height="16" fill="#ccc" rx="1"/>
    <rect x="92" y="65" width="8" height="16" fill="#ccc" rx="1"/>
    <text x="24" y="95" text-anchor="middle" font-size="7" fill="#666">IN</text>
    <text x="60" y="95" text-anchor="middle" font-size="7" fill="#666">GND</text>
    <text x="96" y="95" text-anchor="middle" font-size="7" fill="#666">OUT</text>
    <text x="60" y="30" text-anchor="middle" font-size="10" fill="#ffd700" font-weight="bold">AMS1117</text>
    <text x="60" y="45" text-anchor="middle" font-size="12" fill="#ffd700" font-weight="bold">3.3V</text>
    <rect x="126" y="20" width="14" height="24" fill="#c4a44a" rx="2" stroke="#8a7030" stroke-width="1"/>
    <text x="133" y="60" text-anchor="middle" font-size="6" fill="#666">100nF</text>
  </g>
  
  <!-- YELLOW wire from 3.3V reg output -->
  <line x1="616" y1="345" x2="616" y2="400" stroke="#ffd700" stroke-width="3" stroke-dasharray="none"/>
  <line x1="616" y1="400" x2="700" y2="400" stroke="#ffd700" stroke-width="3"/>
  <text x="660" y="393" text-anchor="middle" font-size="9" fill="#b8960f" font-weight="bold">YELLOW = 3.3V</text>
  
  <!-- GND connections -->
  <line x1="340" y1="251" x2="340" y2="230" stroke="#000" stroke-width="2"/>
  <line x1="580" y1="345" x2="580" y2="370" stroke="#000" stroke-width="2"/>
  <line x1="580" y1="370" x2="580" y2="230" stroke="#000" stroke-width="2" stroke-dasharray="4,3"/>
  
  <!-- 12V to 5V input -->
  <line x1="280" y1="210" x2="304" y2="210" stroke="#ff0000" stroke-width="3"/>
  <line x1="304" y1="210" x2="304" y2="251" stroke="#ff0000" stroke-width="2"/>
  
  <!-- 5V to 3.3V input -->
  <line x1="520" y1="300" x2="544" y2="300" stroke="#ff8c00" stroke-width="2"/>
  <line x1="544" y1="300" x2="544" y2="345" stroke="#ff8c00" stroke-width="2"/>
  
  <!-- Test checkpoint -->
  <g transform="translate(50,380)">
    <rect width="700" height="90" fill="#e8f5e9" rx="8" stroke="#4caf50" stroke-width="2"/>
    <text x="20" y="25" font-size="14" fill="#2e7d32" font-weight="bold">✅ TEST CHECKPOINT</text>
    <text x="20" y="45" font-size="11" fill="#333">Plug in USB-C cable. Set multimeter to DC Voltage.</text>
    <text x="20" y="62" font-size="11" fill="#333">RED wire should read ~12V  •  ORANGE wire should read ~5V  •  YELLOW wire should read ~3.3V</text>
    <text x="20" y="79" font-size="11" fill="#ef4444" font-weight="bold">If any voltage is 0 or wrong → STOP. Check wiring before continuing.</text>
  </g>
</svg>