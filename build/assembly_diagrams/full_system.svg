<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 800 500" font-family="Helvetica, Arial, sans-serif">
  <defs>
    <filter id="shadow5" x="-2%" y="-2%" width="104%" height="104%">
      <feDropShadow dx="2" dy="2" stdDeviation="2" flood-opacity="0.15"/>
    </filter>
  </defs>
  
  <rect width="800" height="500" fill="#f8f9fa" rx="12"/>
  <text x="400" y="28" text-anchor="middle" font-size="18" font-weight="bold" fill="#1a1a2e">FULL SYSTEM: How Everything Connects</text>
  
  <!-- iPhone -->
  <g transform="translate(30,60)" filter="url(#shadow5)">
    <rect width="80" height="140" fill="#111" rx="16" stroke="#333" stroke-width="2"/>
    <rect x="5" y="20" width="70" height="100" fill="#1a472a" rx="4"/>
    <text x="40" y="65" text-anchor="middle" font-size="8" fill="#4caf50" font-weight="bold">LayIt</text>
    <text x="40" y="78" text-anchor="middle" font-size="7" fill="#88cc88">App</text>
    <rect x="28" y="8" width="24" height="6" fill="#222" rx="3"/>
    <text x="40" y="155" text-anchor="middle" font-size="7" fill="#666">iPhone</text>
  </g>
  
  <!-- WiFi waves -->
  <g transform="translate(115,110)">
    <path d="M0,20 Q15,-5 30,20" fill="none" stroke="#3b82f6" stroke-width="1.5" opacity="0.5"/>
    <path d="M5,20 Q15,2 25,20" fill="none" stroke="#3b82f6" stroke-width="1.5" opacity="0.7"/>
    <path d="M10,20 Q15,10 20,20" fill="none" stroke="#3b82f6" stroke-width="1.5"/>
    <text x="15" y="35" text-anchor="middle" font-size="7" fill="#3b82f6">WiFi</text>
  </g>
  
  <!-- ESP32 -->
  <g transform="translate(160,70)" filter="url(#shadow5)">
    <rect width="110" height="120" fill="#006633" rx="4" stroke="#004422" stroke-width="2"/>
    <rect x="30" y="-5" width="50" height="12" fill="#888" rx="4"/>
    <rect x="20" y="30" width="70" height="50" fill="#444" rx="3"/>
    <text x="55" y="55" text-anchor="middle" font-size="8" fill="#aaa" font-weight="bold">ESP32-S3</text>
    <text x="55" y="67" text-anchor="middle" font-size="7" fill="#aaa">WROOM-1</text>
    <text x="55" y="105" text-anchor="middle" font-size="7" fill="#88cc88">The Brain</text>
  </g>
  
  <!-- SPI bus to DAC -->
  <g>
    <line x1="270" y1="110" x2="340" y2="110" stroke="#3b82f6" stroke-width="2"/>
    <line x1="270" y1="120" x2="340" y2="120" stroke="#888" stroke-width="2"/>
    <line x1="270" y1="130" x2="340" y2="130" stroke="#8b5cf6" stroke-width="2"/>
    <text x="305" y="105" text-anchor="middle" font-size="7" fill="#3b82f6">BLUE</text>
    <text x="305" y="118" text-anchor="middle" font-size="7" fill="#555">WHITE</text>
    <text x="305" y="145" text-anchor="middle" font-size="7" fill="#8b5cf6">PURPLE</text>
    <text x="305" y="158" text-anchor="middle" font-size="7" fill="#666">SPI bus</text>
  </g>
  
  <!-- MCP4822 -->
  <g transform="translate(340,90)" filter="url(#shadow5)">
    <rect width="80" height="50" fill="#1a1a1a" rx="3" stroke="#000"/>
    <circle cx="12" cy="12" r="3" fill="#444"/>
    <text x="40" y="28" text-anchor="middle" font-size="8" fill="#aaa" font-weight="bold">MCP4822</text>
    <text x="40" y="40" text-anchor="middle" font-size="7" fill="#888">DAC</text>
    <text x="40" y="60" text-anchor="middle" font-size="7" fill="#666">Digital→Analog</text>
  </g>
  
  <!-- DAC to Op-Amp -->
  <line x1="420" y1="105" x2="470" y2="105" stroke="#8B4513" stroke-width="2"/>
  <line x1="420" y1="125" x2="470" y2="125" stroke="#666" stroke-width="2"/>
  
  <!-- TL072 -->
  <g transform="translate(470,90)" filter="url(#shadow5)">
    <rect width="80" height="50" fill="#1a1a1a" rx="3" stroke="#000"/>
    <circle cx="12" cy="12" r="3" fill="#444"/>
    <text x="40" y="28" text-anchor="middle" font-size="8" fill="#aaa" font-weight="bold">TL072</text>
    <text x="40" y="40" text-anchor="middle" font-size="7" fill="#888">Op-Amp</text>
    <text x="40" y="60" text-anchor="middle" font-size="7" fill="#666">Signal buffer</text>
  </g>
  
  <!-- Op-Amp to Galvos -->
  <line x1="550" y1="105" x2="610" y2="80" stroke="#8B4513" stroke-width="2.5"/>
  <line x1="550" y1="125" x2="610" y2="150" stroke="#666" stroke-width="2.5"/>
  <text x="580" y="74" font-size="7" fill="#8B4513">BROWN</text>
  <text x="580" y="164" font-size="7" fill="#666">GRAY</text>
  
  <!-- Galvo X -->
  <g transform="translate(610,55)" filter="url(#shadow5)">
    <rect width="60" height="40" fill="#e8e8e8" rx="3" stroke="#999"/>
    <polygon points="55,5 75,20 55,35" fill="#ddd" stroke="#999"/>
    <text x="30" y="24" text-anchor="middle" font-size="7" fill="#555" font-weight="bold">GALVO X</text>
  </g>
  
  <!-- Galvo Y -->
  <g transform="translate(610,130)" filter="url(#shadow5)">
    <rect width="60" height="40" fill="#e8e8e8" rx="3" stroke="#999"/>
    <polygon points="55,5 75,20 55,35" fill="#ddd" stroke="#999"/>
    <text x="30" y="24" text-anchor="middle" font-size="7" fill="#555" font-weight="bold">GALVO Y</text>
  </g>
  
  <!-- Laser -->
  <g transform="translate(610,210)" filter="url(#shadow5)">
    <rect width="120" height="35" fill="#555" rx="17" stroke="#333" stroke-width="1.5"/>
    <ellipse cx="120" cy="17" rx="6" ry="15" fill="#1a3a1a" stroke="#333"/>
    <text x="55" y="22" text-anchor="middle" font-size="8" fill="#ccc" font-weight="bold">LASER 200mW</text>
  </g>
  
  <!-- TTL wire from ESP32 to laser -->
  <line x1="215" y1="190" x2="215" y2="228" stroke="#22c55e" stroke-width="2.5"/>
  <line x1="215" y1="228" x2="610" y2="228" stroke="#22c55e" stroke-width="2.5"/>
  <text x="400" y="222" text-anchor="middle" font-size="8" fill="#22c55e" font-weight="bold">GREEN (GPIO4) — Laser ON/OFF</text>
  
  <!-- Beam path -->
  <g>
    <line x1="730" y1="228" x2="730" y2="150" stroke="#22c55e" stroke-width="3" opacity="0.4"/>
    <line x1="730" y1="150" x2="685" y2="75" stroke="#22c55e" stroke-width="3" opacity="0.4"/>
    <line x1="685" y1="75" x2="780" y2="75" stroke="#22c55e" stroke-width="4" opacity="0.6"/>
    <text x="750" y="68" text-anchor="middle" font-size="8" fill="#22c55e" font-weight="bold">→ WALL</text>
    <text x="740" y="200" font-size="7" fill="#22c55e" transform="rotate(-90,740,200)">beam path</text>
  </g>
  
  <!-- Power distribution -->
  <g transform="translate(30,290)">
    <rect width="740" height="180" fill="#fff" rx="8" stroke="#ddd" stroke-width="1"/>
    <text x="370" y="22" text-anchor="middle" font-size="13" fill="#333" font-weight="bold">Power Distribution</text>
    
    <!-- USB-C PD -->
    <g transform="translate(20,40)">
      <rect width="100" height="50" fill="#1a472a" rx="4" stroke="#0d2818"/>
      <rect x="35" y="-5" width="30" height="10" fill="#888" rx="3"/>
      <text x="50" y="28" text-anchor="middle" font-size="8" fill="#8fbc8f" font-weight="bold">USB-C PD</text>
      <text x="50" y="40" text-anchor="middle" font-size="7" fill="#8fbc8f">12V source</text>
    </g>
    
    <!-- 12V rail -->
    <line x1="120" y1="65" x2="200" y2="65" stroke="#ff0000" stroke-width="3"/>
    <text x="160" y="58" text-anchor="middle" font-size="8" fill="#ff0000" font-weight="bold">12V</text>
    
    <!-- 5V reg -->
    <g transform="translate(200,50)">
      <rect width="80" height="35" fill="#2d2d2d" rx="3"/>
      <text x="40" y="22" text-anchor="middle" font-size="8" fill="#ff8c00" font-weight="bold">5V REG</text>
    </g>
    
    <line x1="280" y1="65" x2="380" y2="65" stroke="#ff8c00" stroke-width="3"/>
    <text x="330" y="58" text-anchor="middle" font-size="8" fill="#ff8c00" font-weight="bold">5V</text>
    
    <!-- 3.3V reg -->
    <g transform="translate(380,50)">
      <rect width="80" height="35" fill="#2d2d2d" rx="3"/>
      <text x="40" y="22" text-anchor="middle" font-size="8" fill="#ffd700" font-weight="bold">3.3V REG</text>
    </g>
    
    <line x1="460" y1="65" x2="540" y2="65" stroke="#ffd700" stroke-width="3"/>
    <text x="500" y="58" text-anchor="middle" font-size="8" fill="#b8960f" font-weight="bold">3.3V</text>
    
    <!-- What gets what -->
    <text x="20" y="115" font-size="10" fill="#333" font-weight="bold">Who gets what power:</text>
    <text x="20" y="133" font-size="9" fill="#ff0000">● 12V (RED): Laser module, Galvo drivers</text>
    <text x="20" y="150" font-size="9" fill="#ff8c00">● 5V (ORANGE): ESP32 VIN, TL072 op-amp</text>
    <text x="20" y="167" font-size="9" fill="#b8960f">● 3.3V (YELLOW): MCP4822 DAC</text>
    <text x="370" y="133" font-size="9" fill="#000">● GND (BLACK): Everything shares one ground rail</text>
    <text x="370" y="150" font-size="9" fill="#666" font-style="italic">All grounds must connect together!</text>
  </g>
</svg>