<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 800 400" font-family="Helvetica, Arial, sans-serif">
  <defs>
    <filter id="shadow4" x="-2%" y="-2%" width="104%" height="104%">
      <feDropShadow dx="2" dy="2" stdDeviation="2" flood-opacity="0.15"/>
    </filter>
    <linearGradient id="laserGrad" x1="0%" y1="0%" x2="100%" y2="0%">
      <stop offset="0%" style="stop-color:#22c55e;stop-opacity:1"/>
      <stop offset="100%" style="stop-color:#22c55e;stop-opacity:0"/>
    </linearGradient>
  </defs>
  
  <rect width="800" height="400" fill="#f8f9fa" rx="12"/>
  <text x="400" y="30" text-anchor="middle" font-size="18" font-weight="bold" fill="#1a1a2e">STEP 4: Laser Module</text>
  <text x="400" y="50" text-anchor="middle" font-size="12" fill="#666">Connect the laser so the ESP32 can turn it on and off</text>
  
  <!-- Safety warning -->
  <g transform="translate(50,65)">
    <rect width="700" height="45" fill="#fef2f2" rx="8" stroke="#ef4444" stroke-width="2"/>
    <text x="20" y="18" font-size="12" fill="#dc2626" font-weight="bold">⚠️ LASER SAFETY — Read before wiring!</text>
    <text x="20" y="36" font-size="10" fill="#991b1b">Never look into beam. Wear OD4+ goggles for 520nm. Point at wall, not people. Tape module down before powering on.</text>
  </g>
  
  <!-- Laser Module -->
  <g transform="translate(250,140)" filter="url(#shadow4)">
    <!-- Cylindrical body -->
    <rect width="160" height="60" fill="#555" rx="30" stroke="#333" stroke-width="2"/>
    <ellipse cx="0" cy="30" rx="8" ry="30" fill="#666" stroke="#333" stroke-width="1"/>
    <!-- Lens end -->
    <ellipse cx="160" cy="30" rx="10" ry="28" fill="#444" stroke="#333" stroke-width="1.5"/>
    <ellipse cx="160" cy="30" rx="6" ry="20" fill="#1a3a1a" stroke="#333" stroke-width="1"/>
    <!-- Wires coming out the back -->
    <line x1="-5" y1="15" x2="-40" y2="15" stroke="#ff0000" stroke-width="3"/>
    <line x1="-5" y1="30" x2="-40" y2="30" stroke="#000" stroke-width="3"/>
    <line x1="-5" y1="45" x2="-40" y2="45" stroke="#22c55e" stroke-width="3"/>
    
    <!-- Labels -->
    <text x="80" y="35" text-anchor="middle" font-size="11" fill="#ccc" font-weight="bold">200mW 520nm</text>
    <text x="80" y="80" text-anchor="middle" font-size="10" fill="#333" font-weight="bold">Laser Module</text>
    
    <!-- Green beam -->
    <line x1="170" y1="30" x2="550" y2="30" stroke="url(#laserGrad)" stroke-width="4"/>
    <line x1="170" y1="30" x2="550" y2="15" stroke="url(#laserGrad)" stroke-width="1" opacity="0.3"/>
    <line x1="170" y1="30" x2="550" y2="45" stroke="url(#laserGrad)" stroke-width="1" opacity="0.3"/>
  </g>
  
  <!-- Wire labels -->
  <g transform="translate(60,140)">
    <text x="140" y="18" text-anchor="end" font-size="10" fill="#ff0000" font-weight="bold">RED (12V) →</text>
    <text x="80" y="6" font-size="8" fill="#666">Power (V+)</text>
    
    <text x="140" y="33" text-anchor="end" font-size="10" fill="#000" font-weight="bold">BLACK (GND) →</text>
    <text x="80" y="21" font-size="8" fill="#666">Ground</text>
    
    <text x="140" y="48" text-anchor="end" font-size="10" fill="#22c55e" font-weight="bold">GREEN (GPIO4) →</text>
    <text x="80" y="36" font-size="8" fill="#666">TTL control</text>
  </g>
  
  <!-- How TTL works box -->
  <g transform="translate(50,250)">
    <rect width="340" height="80" fill="#f0fdf4" rx="8" stroke="#22c55e" stroke-width="1"/>
    <text x="15" y="22" font-size="11" fill="#166534" font-weight="bold">How TTL works:</text>
    <text x="15" y="42" font-size="10" fill="#333">ESP32 GPIO4 = HIGH (3.3V) → Laser ON</text>
    <text x="15" y="58" font-size="10" fill="#333">ESP32 GPIO4 = LOW (0V)   → Laser OFF</text>
    <text x="15" y="74" font-size="10" fill="#666">The ESP32 flips this 15,000+ times/sec to draw</text>
  </g>
  
  <!-- Test -->
  <g transform="translate(420,250)">
    <rect width="330" height="80" fill="#e8f5e9" rx="8" stroke="#4caf50" stroke-width="2"/>
    <text x="15" y="22" font-size="14" fill="#2e7d32" font-weight="bold">✅ TEST</text>
    <text x="15" y="42" font-size="10" fill="#333">Tape laser to table → point at wall → goggles on</text>
    <text x="15" y="58" font-size="10" fill="#333">Power on. Laser should be OFF (GPIO default LOW)</text>
    <text x="15" y="74" font-size="10" fill="#ef4444" font-weight="bold">If laser is ON → UNPLUG! TTL wire is loose</text>
  </g>
</svg>