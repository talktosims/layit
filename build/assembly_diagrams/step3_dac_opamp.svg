<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 800 550" font-family="Helvetica, Arial, sans-serif">
  <defs>
    <filter id="shadow3" x="-2%" y="-2%" width="104%" height="104%">
      <feDropShadow dx="2" dy="2" stdDeviation="2" flood-opacity="0.15"/>
    </filter>
  </defs>
  
  <rect width="800" height="550" fill="#f8f9fa" rx="12"/>
  <text x="400" y="30" text-anchor="middle" font-size="18" font-weight="bold" fill="#1a1a2e">STEP 3: DAC + Op-Amp → Galvo Signal</text>
  <text x="400" y="50" text-anchor="middle" font-size="12" fill="#666">ESP32 sends numbers → DAC makes voltage → Op-amp boosts it → Galvo mirrors move</text>
  
  <!-- MCP4822 DIP-8 chip -->
  <g transform="translate(80,100)" filter="url(#shadow3)">
    <!-- Chip body -->
    <rect width="100" height="60" fill="#1a1a1a" rx="3" stroke="#000" stroke-width="1"/>
    <!-- Pin 1 dot -->
    <circle cx="15" cy="15" r="4" fill="#444"/>
    <!-- Notch -->
    <path d="M45,0 A8,8 0 0,0 55,0" fill="#333" stroke="none"/>
    <!-- Label -->
    <text x="50" y="35" text-anchor="middle" font-size="9" fill="#aaa" font-weight="bold">MCP4822</text>
    <text x="50" y="48" text-anchor="middle" font-size="7" fill="#888">DAC</text>
    
    <!-- Left pins (1-4) -->
    <rect x="-12" y="8" width="14" height="4" fill="#ccc" rx="0.5"/>
    <rect x="-12" y="20" width="14" height="4" fill="#ccc" rx="0.5"/>
    <rect x="-12" y="32" width="14" height="4" fill="#ccc" rx="0.5"/>
    <rect x="-12" y="44" width="14" height="4" fill="#ccc" rx="0.5"/>
    
    <!-- Right pins (8-5) -->
    <rect x="98" y="8" width="14" height="4" fill="#ccc" rx="0.5"/>
    <rect x="98" y="20" width="14" height="4" fill="#ccc" rx="0.5"/>
    <rect x="98" y="32" width="14" height="4" fill="#ccc" rx="0.5"/>
    <rect x="98" y="44" width="14" height="4" fill="#ccc" rx="0.5"/>
    
    <!-- Pin labels -->
    <text x="-18" y="13" text-anchor="end" font-size="7" fill="#333">1 VDD</text>
    <text x="-18" y="25" text-anchor="end" font-size="7" fill="#333">2 CS</text>
    <text x="-18" y="37" text-anchor="end" font-size="7" fill="#333">3 SCK</text>
    <text x="-18" y="49" text-anchor="end" font-size="7" fill="#333">4 SDI</text>
    <text x="118" y="13" font-size="7" fill="#333">VOUTA 8</text>
    <text x="118" y="25" font-size="7" fill="#333">VREF 7</text>
    <text x="118" y="37" font-size="7" fill="#333">VOUTB 6</text>
    <text x="118" y="49" font-size="7" fill="#333">LDAC 5</text>
  </g>
  
  <!-- Wires from ESP32 to MCP4822 -->
  <line x1="30" y1="122" x2="68" y2="122" stroke="#8b5cf6" stroke-width="2.5"/>
  <text x="25" y="119" text-anchor="end" font-size="8" fill="#8b5cf6" font-weight="bold">PURPLE (GPIO5)</text>
  <line x1="30" y1="134" x2="68" y2="134" stroke="#888" stroke-width="2.5"/>
  <text x="25" y="131" text-anchor="end" font-size="8" fill="#555" font-weight="bold">WHITE (GPIO18)</text>
  <line x1="30" y1="146" x2="68" y2="146" stroke="#3b82f6" stroke-width="2.5"/>
  <text x="25" y="143" text-anchor="end" font-size="8" fill="#3b82f6" font-weight="bold">BLUE (GPIO23)</text>
  
  <!-- Power to DAC -->
  <line x1="30" y1="110" x2="68" y2="110" stroke="#ffd700" stroke-width="2"/>
  <text x="25" y="107" text-anchor="end" font-size="8" fill="#b8960f" font-weight="bold">YELLOW (3.3V)</text>
  
  <!-- GND to LDAC -->
  <line x1="68" y1="156" x2="30" y2="156" stroke="#000" stroke-width="2"/>
  <text x="25" y="159" text-anchor="end" font-size="8" fill="#000" font-weight="bold">BLACK (GND)</text>
  
  <!-- TL072 Op-Amp DIP-8 -->
  <g transform="translate(370,100)" filter="url(#shadow3)">
    <rect width="100" height="60" fill="#1a1a1a" rx="3" stroke="#000" stroke-width="1"/>
    <circle cx="15" cy="15" r="4" fill="#444"/>
    <path d="M45,0 A8,8 0 0,0 55,0" fill="#333" stroke="none"/>
    <text x="50" y="35" text-anchor="middle" font-size="9" fill="#aaa" font-weight="bold">TL072</text>
    <text x="50" y="48" text-anchor="middle" font-size="7" fill="#888">Op-Amp</text>
    
    <rect x="-12" y="8" width="14" height="4" fill="#ccc" rx="0.5"/>
    <rect x="-12" y="20" width="14" height="4" fill="#ccc" rx="0.5"/>
    <rect x="-12" y="32" width="14" height="4" fill="#ccc" rx="0.5"/>
    <rect x="-12" y="44" width="14" height="4" fill="#ccc" rx="0.5"/>
    <rect x="98" y="8" width="14" height="4" fill="#ccc" rx="0.5"/>
    <rect x="98" y="20" width="14" height="4" fill="#ccc" rx="0.5"/>
    <rect x="98" y="32" width="14" height="4" fill="#ccc" rx="0.5"/>
    <rect x="98" y="44" width="14" height="4" fill="#ccc" rx="0.5"/>
    
    <text x="-18" y="13" text-anchor="end" font-size="7" fill="#333">1 OUT-A</text>
    <text x="-18" y="25" text-anchor="end" font-size="7" fill="#333">2 IN- A</text>
    <text x="-18" y="37" text-anchor="end" font-size="7" fill="#333">3 IN+ A</text>
    <text x="-18" y="49" text-anchor="end" font-size="7" fill="#333">4 V-</text>
    <text x="118" y="13" font-size="7" fill="#333">V+ 8</text>
    <text x="118" y="25" font-size="7" fill="#333">OUT-B 7</text>
    <text x="118" y="37" font-size="7" fill="#333">IN- B 6</text>
    <text x="118" y="49" font-size="7" fill="#333">IN+ B 5</text>
  </g>
  
  <!-- DAC VOUTA → TL072 IN+ A -->
  <line x1="192" y1="110" x2="280" y2="110" stroke="#8B4513" stroke-width="2.5"/>
  <line x1="280" y1="110" x2="280" y2="134" stroke="#8B4513" stroke-width="2.5"/>
  <line x1="280" y1="134" x2="358" y2="134" stroke="#8B4513" stroke-width="2.5"/>
  <text x="270" y="103" font-size="8" fill="#8B4513" font-weight="bold">BROWN (Galvo X signal)</text>
  
  <!-- DAC VOUTB → TL072 IN+ B -->
  <line x1="192" y1="134" x2="240" y2="134" stroke="#666" stroke-width="2.5"/>
  <line x1="240" y1="134" x2="240" y2="156" stroke="#666" stroke-width="2.5"/>
  <line x1="240" y1="156" x2="358" y2="156" stroke="#666" stroke-width="2.5"/>
  <text x="240" y="170" font-size="8" fill="#666" font-weight="bold">GRAY (Galvo Y signal)</text>
  
  <!-- Feedback loops (voltage follower) -->
  <path d="M358,110 L340,110 L340,122 L358,122" fill="none" stroke="#e94560" stroke-width="1.5" stroke-dasharray="3,2"/>
  <text x="310" y="118" font-size="7" fill="#e94560">feedback</text>
  <path d="M482,126 L500,126 L500,138 L482,138" fill="none" stroke="#e94560" stroke-width="1.5" stroke-dasharray="3,2"/>
  <text x="510" y="135" font-size="7" fill="#e94560">feedback</text>
  
  <!-- Op-amp power -->
  <line x1="482" y1="110" x2="520" y2="110" stroke="#ff8c00" stroke-width="2"/>
  <text x="525" y="114" font-size="8" fill="#ff8c00" font-weight="bold">ORANGE (5V)</text>
  <line x1="358" y1="148" x2="330" y2="148" stroke="#000" stroke-width="2"/>
  <text x="325" y="152" text-anchor="end" font-size="8" fill="#000" font-weight="bold">BLACK (GND)</text>
  
  <!-- Output to Galvos -->
  <g transform="translate(550,80)">
    <rect width="200" height="180" fill="#fff" rx="8" stroke="#ddd" stroke-width="1"/>
    <text x="100" y="22" text-anchor="middle" font-size="11" fill="#333" font-weight="bold">→ To Galvo Driver Boards</text>
    
    <!-- Galvo X motor -->
    <g transform="translate(20,40)">
      <rect width="70" height="50" fill="#e8e8e8" rx="4" stroke="#999" stroke-width="1.5"/>
      <rect x="70" y="10" width="30" height="8" fill="#ccc" rx="1" stroke="#999"/>
      <polygon points="95,5 115,14 95,23" fill="#ddd" stroke="#999" stroke-width="1"/>
      <text x="35" y="30" text-anchor="middle" font-size="8" fill="#555" font-weight="bold">GALVO X</text>
      <text x="35" y="42" text-anchor="middle" font-size="7" fill="#888">motor</text>
      <text x="107" y="40" text-anchor="middle" font-size="7" fill="#888">mirror</text>
    </g>
    
    <!-- Galvo Y motor -->
    <g transform="translate(20,110)">
      <rect width="70" height="50" fill="#e8e8e8" rx="4" stroke="#999" stroke-width="1.5"/>
      <rect x="70" y="10" width="30" height="8" fill="#ccc" rx="1" stroke="#999"/>
      <polygon points="95,5 115,14 95,23" fill="#ddd" stroke="#999" stroke-width="1"/>
      <text x="35" y="30" text-anchor="middle" font-size="8" fill="#555" font-weight="bold">GALVO Y</text>
      <text x="35" y="42" text-anchor="middle" font-size="7" fill="#888">motor</text>
      <text x="107" y="40" text-anchor="middle" font-size="7" fill="#888">mirror</text>
    </g>
  </g>
  
  <!-- TL072 outputs to galvos -->
  <line x1="358" y1="110" x2="340" y2="110" stroke="#8B4513" stroke-width="2.5"/>
  <line x1="340" y1="110" x2="340" y2="90" stroke="#8B4513" stroke-width="2.5"/>
  <line x1="340" y1="90" x2="570" y2="90" stroke="#8B4513" stroke-width="2.5"/>
  <circle cx="570" cy="90" r="3" fill="#8B4513"/>
  
  <line x1="482" y1="126" x2="530" y2="126" stroke="#666" stroke-width="2.5"/>
  <line x1="530" y1="126" x2="530" y2="160" stroke="#666" stroke-width="2.5"/>
  <line x1="530" y1="160" x2="570" y2="160" stroke="#666" stroke-width="2.5"/>
  <circle cx="570" cy="160" r="3" fill="#666"/>
  
  <!-- Signal flow arrow -->
  <g transform="translate(80,300)">
    <rect width="640" height="60" fill="#e3f2fd" rx="8" stroke="#2196f3" stroke-width="1"/>
    <text x="320" y="22" text-anchor="middle" font-size="12" fill="#1565c0" font-weight="bold">Signal Flow:</text>
    <text x="320" y="42" text-anchor="middle" font-size="11" fill="#333">ESP32 (digital) → SPI bus → MCP4822 DAC (analog) → TL072 buffer → Galvo driver → Mirror moves</text>
  </g>
  
  <!-- Test checkpoint -->
  <g transform="translate(50,400)">
    <rect width="700" height="70" fill="#e8f5e9" rx="8" stroke="#4caf50" stroke-width="2"/>
    <text x="20" y="22" font-size="14" fill="#2e7d32" font-weight="bold">✅ TEST CHECKPOINT</text>
    <text x="20" y="42" font-size="11" fill="#333">Power on. Multimeter: TL072 pin 8 = ~5V, pin 4 = 0V. MCP4822 pin 1 = ~3.3V.</text>
    <text x="20" y="60" font-size="11" fill="#333">If voltages are correct, the analog signal path is ready for firmware.</text>
  </g>
</svg>