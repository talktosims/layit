<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 800 450" font-family="Helvetica, Arial, sans-serif">
  <defs>
    <filter id="shadow2" x="-2%" y="-2%" width="104%" height="104%">
      <feDropShadow dx="2" dy="2" stdDeviation="2" flood-opacity="0.15"/>
    </filter>
  </defs>
  
  <rect width="800" height="450" fill="#f8f9fa" rx="12"/>
  <text x="400" y="30" text-anchor="middle" font-size="18" font-weight="bold" fill="#1a1a2e">STEP 2: ESP32-S3 Dev Board</text>
  <text x="400" y="50" text-anchor="middle" font-size="12" fill="#666">Connect power and verify the brain of the system works</text>
  
  <!-- ESP32-S3 Dev Board -->
  <g transform="translate(200,80)" filter="url(#shadow2)">
    <!-- PCB -->
    <rect width="200" height="280" fill="#006633" rx="4" stroke="#004422" stroke-width="2"/>
    
    <!-- USB-C port at top -->
    <rect x="75" y="-6" width="50" height="14" fill="#888" rx="4" stroke="#555" stroke-width="1.5"/>
    <rect x="82" y="-3" width="36" height="8" fill="#333" rx="2"/>
    <text x="100" y="20" text-anchor="middle" font-size="7" fill="#aaffaa">USB-C</text>
    
    <!-- WiFi antenna area -->
    <rect x="40" y="220" width="120" height="50" fill="#005522" rx="2" stroke="#88cc88" stroke-width="0.5" stroke-dasharray="2,2"/>
    <text x="100" y="248" text-anchor="middle" font-size="8" fill="#88cc88">ANTENNA</text>
    
    <!-- ESP32 chip (metal shield) -->
    <rect x="45" y="80" width="110" height="80" fill="#444" rx="3" stroke="#222" stroke-width="1.5"/>
    <text x="100" y="115" text-anchor="middle" font-size="8" fill="#aaa" font-weight="bold">ESP32-S3</text>
    <text x="100" y="130" text-anchor="middle" font-size="7" fill="#aaa">WROOM-1</text>
    <text x="100" y="145" text-anchor="middle" font-size="6" fill="#888">N16R8</text>
    
    <!-- Left pin row -->
    <g fill="#ccc" stroke="#999" stroke-width="0.5">
      <rect x="-8" y="30" width="16" height="6" rx="1"/><text x="18" y="36" font-size="6" fill="#aaffaa">3V3</text>
      <rect x="-8" y="44" width="16" height="6" rx="1"/><text x="18" y="50" font-size="6" fill="#aaffaa">GND</text>
      <rect x="-8" y="58" width="16" height="6" rx="1"/><text x="18" y="64" font-size="6" fill="#aaffaa">GPIO4</text>
      <rect x="-8" y="72" width="16" height="6" rx="1"/><text x="18" y="78" font-size="6" fill="#aaffaa">GPIO5</text>
      <rect x="-8" y="170" width="16" height="6" rx="1"/><text x="18" y="176" font-size="6" fill="#aaffaa">GPIO18</text>
      <rect x="-8" y="184" width="16" height="6" rx="1"/><text x="18" y="190" font-size="6" fill="#aaffaa">GPIO23</text>
    </g>
    
    <!-- Right pin row -->
    <g fill="#ccc" stroke="#999" stroke-width="0.5">
      <rect x="192" y="30" width="16" height="6" rx="1"/><text x="188" y="36" font-size="6" fill="#aaffaa" text-anchor="end">5V/VIN</text>
      <rect x="192" y="44" width="16" height="6" rx="1"/><text x="188" y="50" font-size="6" fill="#aaffaa" text-anchor="end">GND</text>
    </g>
  </g>
  
  <!-- Power wires -->
  <!-- ORANGE 5V to VIN -->
  <line x1="100" y1="113" x2="408" y2="113" stroke="#ff8c00" stroke-width="3"/>
  <circle cx="408" cy="113" r="4" fill="#ff8c00"/>
  <text x="100" y="107" font-size="10" fill="#ff8c00" font-weight="bold">ORANGE (5V) →</text>
  <text x="420" y="117" font-size="9" fill="#ff8c00">← to VIN pin</text>
  
  <!-- BLACK GND -->
  <line x1="100" y1="127" x2="408" y2="127" stroke="#000" stroke-width="3"/>
  <circle cx="408" cy="127" r="4" fill="#000"/>
  <text x="100" y="140" font-size="10" fill="#333" font-weight="bold">BLACK (GND) →</text>
  <text x="420" y="131" font-size="9" fill="#333">← to GND pin</text>
  
  <!-- Pin labels for later steps -->
  <g transform="translate(480,80)">
    <rect width="270" height="200" fill="#fff3e0" rx="8" stroke="#ff8c00" stroke-width="1"/>
    <text x="135" y="22" text-anchor="middle" font-size="11" fill="#e65100" font-weight="bold">Pins We'll Use Later:</text>
    <text x="15" y="45" font-size="10" fill="#333">GPIO 4  → 🟢 GREEN wire → Laser TTL</text>
    <text x="15" y="65" font-size="10" fill="#333">GPIO 5  → 🟣 PURPLE wire → DAC Chip Select</text>
    <text x="15" y="85" font-size="10" fill="#333">GPIO 18 → ⚪ WHITE wire → DAC Clock</text>
    <text x="15" y="105" font-size="10" fill="#333">GPIO 23 → 🔵 BLUE wire → DAC Data</text>
    <text x="15" y="135" font-size="10" fill="#666" font-style="italic">Don't wire these yet!</text>
    <text x="15" y="155" font-size="10" fill="#666" font-style="italic">Just know where they are.</text>
  </g>
  
  <!-- Test checkpoint -->
  <g transform="translate(50,380)">
    <rect width="700" height="50" fill="#e8f5e9" rx="8" stroke="#4caf50" stroke-width="2"/>
    <text x="20" y="22" font-size="14" fill="#2e7d32" font-weight="bold">✅ TEST: Plug in USB-C. ESP32's built-in LED should light up or blink.</text>
    <text x="20" y="40" font-size="11" fill="#333">If nothing: check 5V at VIN pin with multimeter. Try ESP32's own USB-C port to verify the board works.</text>
  </g>
</svg>