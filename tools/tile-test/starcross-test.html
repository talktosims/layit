<!DOCTYPE html>
<html>
<head>
<title>Star & Cross Tessellation Lab</title>
<style>
* { margin: 0; padding: 0; box-sizing: border-box; }
body { background: #1a1a1a; color: #eee; font-family: 'SF Mono', 'Menlo', monospace; font-size: 13px; }
.layout { display: flex; height: 100vh; }
.sidebar { width: 320px; padding: 16px; overflow-y: auto; background: #222; border-right: 1px solid #444; flex-shrink: 0; }
.main { flex: 1; display: flex; flex-direction: column; }
canvas { flex: 1; cursor: crosshair; }
h2 { font-size: 15px; margin-bottom: 12px; color: #7fdbca; }
h3 { font-size: 12px; margin: 16px 0 8px; color: #c792ea; text-transform: uppercase; letter-spacing: 1px; }
.row { display: flex; align-items: center; margin: 6px 0; gap: 8px; }
.row label { flex: 0 0 120px; color: #999; }
.row input[type=range] { flex: 1; }
.row .val { flex: 0 0 50px; text-align: right; color: #ffcb6b; }
.info { padding: 8px 12px; background: #2a2a2a; border-top: 1px solid #444; font-size: 11px; color: #888; }
.btn { background: #3a3a3a; border: 1px solid #555; color: #eee; padding: 6px 12px; cursor: pointer; border-radius: 3px; font-size: 12px; margin: 4px 2px; }
.btn:hover { background: #4a4a4a; }
.btn.active { background: #2a5a3a; border-color: #4a8a5a; }
.color-row { display: flex; gap: 8px; align-items: center; margin: 4px 0; }
.color-row label { flex: 0 0 60px; color: #999; }
.color-row input[type=color] { width: 40px; height: 24px; border: none; cursor: pointer; }
#dropZone { border: 2px dashed #555; border-radius: 8px; padding: 16px; text-align: center; margin: 8px 0; color: #666; cursor: pointer; font-size: 11px; }
#dropZone.dragover { border-color: #7fdbca; color: #7fdbca; }
.metrics { background: #1e2d1e; border: 1px solid #3a5a3a; border-radius: 4px; padding: 8px; margin: 8px 0; font-size: 11px; line-height: 1.6; }
</style>
</head>
<body>
<div class="layout">
  <div class="sidebar">
    <h2>Star & Cross Lab v2</h2>

    <h3>Geometry</h3>
    <div class="row"><label>Cell Size</label><input type="range" id="cellSize" min="60" max="300" step="2" value="160"><span class="val" id="cellSizeV">160</span></div>
    <div class="row"><label>Star/Cell Ratio</label><input type="range" id="starRatio" min="0.70" max="0.99" step="0.01" value="0.94"><span class="val" id="starRatioV">0.94</span></div>
    <div class="row"><label>Curve Depth</label><input type="range" id="curveDepth" min="0.00" max="0.95" step="0.01" value="0.55"><span class="val" id="curveDepthV">0.55</span></div>
    <div class="row"><label>Grout (px)</label><input type="range" id="grout" min="0" max="12" step="0.5" value="3"><span class="val" id="groutV">3</span></div>

    <h3>Colors</h3>
    <div class="color-row"><label>Star</label><input type="color" id="starColor" value="#4a7c6f"></div>
    <div class="color-row"><label>Cross</label><input type="color" id="crossColor" value="#f0ead6"></div>
    <div class="color-row"><label>Grout</label><input type="color" id="groutColor" value="#c8c0b0"></div>

    <h3>Reference Image</h3>
    <div id="dropZone">Drop image here or click<input type="file" id="refFile" accept="image/*" style="display:none"></div>
    <div class="row"><label>Opacity</label><input type="range" id="overlayOpacity" min="0" max="100" step="5" value="0"><span class="val" id="overlayOpacityV">0</span></div>
    <div class="row"><label>Scale</label><input type="range" id="refScale" min="0.1" max="4.0" step="0.05" value="1.0"><span class="val" id="refScaleV">1.0</span></div>
    <div class="row"><label>Offset X</label><input type="range" id="refOffX" min="-500" max="500" step="1" value="0"><span class="val" id="refOffXV">0</span></div>
    <div class="row"><label>Offset Y</label><input type="range" id="refOffY" min="-500" max="500" step="1" value="0"><span class="val" id="refOffYV">0</span></div>

    <h3>Measurements</h3>
    <div class="metrics" id="metrics"></div>
  </div>
  <div class="main">
    <canvas id="c"></canvas>
    <div class="info" id="statusBar">Drag a reference image to overlay and compare</div>
  </div>
</div>

<script>
const canvas = document.getElementById('c');
const ctx = canvas.getContext('2d');
let refImg = null;

// ─── Prevent browser from navigating on drop anywhere ───
document.addEventListener('dragover', function(e) { e.preventDefault(); });
document.addEventListener('drop', function(e) {
  e.preventDefault();
  if (e.dataTransfer && e.dataTransfer.files && e.dataTransfer.files[0]) {
    loadImg(e.dataTransfer.files[0]);
    // Auto-set opacity to 50% so you can see it
    document.getElementById('overlayOpacity').value = 50;
    document.getElementById('overlayOpacityV').textContent = '50';
  }
});

// ─── Resize ───
function resize() {
  canvas.width = canvas.clientWidth * devicePixelRatio;
  canvas.height = canvas.clientHeight * devicePixelRatio;
  ctx.setTransform(devicePixelRatio, 0, 0, devicePixelRatio, 0, 0);
  draw();
}
window.addEventListener('resize', resize);

// ─── Controls ───
const sliders = ['cellSize','starRatio','curveDepth','grout','overlayOpacity','refScale','refOffX','refOffY'];
sliders.forEach(id => {
  document.getElementById(id).addEventListener('input', function() {
    document.getElementById(id + 'V').textContent = this.value;
    draw();
  });
});
['starColor','crossColor','groutColor'].forEach(id => {
  document.getElementById(id).addEventListener('input', draw);
});

// ─── Reference Image ───
const dropZone = document.getElementById('dropZone');
const refFile = document.getElementById('refFile');
dropZone.addEventListener('click', () => refFile.click());
dropZone.addEventListener('dragover', e => { e.preventDefault(); dropZone.classList.add('dragover'); });
dropZone.addEventListener('dragleave', () => dropZone.classList.remove('dragover'));
dropZone.addEventListener('drop', e => { e.preventDefault(); dropZone.classList.remove('dragover'); loadImg(e.dataTransfer.files[0]); });
refFile.addEventListener('change', e => { if (e.target.files[0]) loadImg(e.target.files[0]); });
function loadImg(file) {
  const img = new Image();
  img.onload = () => { refImg = img; dropZone.textContent = file.name; draw(); };
  img.src = URL.createObjectURL(file);
}

// ─── Star Edge: Quadratic Bezier Curve ───
// Draws one curved edge of the star from tip A to tip B with concave bow toward center.
// depth: 0 = straight line, 1 = curve passes through center
function drawStarEdge(cx, cy, ax, ay, bx, by, depth) {
  // Midpoint of straight line A→B
  var mx = (ax + bx) / 2;
  var my = (ay + by) / 2;
  // Vector from midpoint toward star center
  var dx = cx - mx;
  var dy = cy - my;
  // Control point: interpolate from midpoint toward center by 'depth'
  var cpx = mx + dx * depth;
  var cpy = my + dy * depth;
  ctx.quadraticCurveTo(cpx, cpy, bx, by);
}

// ─── Draw Star ───
function drawStar(cx, cy, R, depth, g) {
  var r = R - g / 2;
  ctx.beginPath();
  ctx.moveTo(cx, cy - r);  // top tip
  drawStarEdge(cx, cy, cx, cy - r, cx + r, cy, depth);         // top → right
  drawStarEdge(cx, cy, cx + r, cy, cx, cy + r, depth);         // right → bottom
  drawStarEdge(cx, cy, cx, cy + r, cx - r, cy, depth);         // bottom → left
  drawStarEdge(cx, cy, cx - r, cy, cx, cy - r, depth);         // left → top
  ctx.closePath();
}

// ─── Draw Cross (complement of 4 surrounding stars) ───
function drawCross(cx, cy, S, R, depth, g) {
  // The cross at (cx,cy) is surrounded by 4 stars at diagonal offsets.
  // Each cross arm side IS a star edge from the adjacent star.
  // The cross has 4 curved sides + 4 straight arm tips.

  var b = S/2 - R + g/2;    // arm tip half-width
  var arm = S/2 - g/2;       // arm length from center
  var r = R;                  // star radius (no grout reduction — cross edge matches star edge)

  // Stars at: NE(+S/2, -S/2), SE(+S/2, +S/2), SW(-S/2, +S/2), NW(-S/2, -S/2)
  // Each star contributes one curved edge to the cross.

  // For star at (sx, sy), the edge from its bottom tip to its left tip
  // borders the cross. The control point for this edge is computed
  // relative to the star center.

  ctx.beginPath();

  // N arm tip (straight)
  ctx.moveTo(cx - b, cy - arm);
  ctx.lineTo(cx + b, cy - arm);

  // NE curve: star at (cx+S/2, cy-S/2), edge from left tip to bottom tip
  // Star left tip: (cx+S/2-r, cy-S/2), Star bottom tip: (cx+S/2, cy-S/2+r)
  // This edge goes from the star's left tip to bottom tip
  var ne_sx = cx + S/2, ne_sy = cy - S/2;
  drawStarEdge(ne_sx, ne_sy, ne_sx - r, ne_sy, ne_sx, ne_sy + r, depth);

  // E arm tip (straight)
  ctx.lineTo(cx + arm, cy - b);
  ctx.lineTo(cx + arm, cy + b);

  // SE curve: star at (cx+S/2, cy+S/2), edge from top tip to left tip
  var se_sx = cx + S/2, se_sy = cy + S/2;
  drawStarEdge(se_sx, se_sy, se_sx, se_sy - r, se_sx - r, se_sy, depth);

  // S arm tip
  ctx.lineTo(cx + b, cy + arm);
  ctx.lineTo(cx - b, cy + arm);

  // SW curve: star at (cx-S/2, cy+S/2), edge from right tip to top tip
  var sw_sx = cx - S/2, sw_sy = cy + S/2;
  drawStarEdge(sw_sx, sw_sy, sw_sx + r, sw_sy, sw_sx, sw_sy - r, depth);

  // W arm tip
  ctx.lineTo(cx - arm, cy + b);
  ctx.lineTo(cx - arm, cy - b);

  // NW curve: star at (cx-S/2, cy-S/2), edge from bottom tip to right tip
  var nw_sx = cx - S/2, nw_sy = cy - S/2;
  drawStarEdge(nw_sx, nw_sy, nw_sx, nw_sy + r, nw_sx + r, nw_sy, depth);

  ctx.closePath();
}

// ─── Main Draw ───
function draw() {
  var W = canvas.clientWidth;
  var H = canvas.clientHeight;
  var S = parseFloat(document.getElementById('cellSize').value);
  var starRatio = parseFloat(document.getElementById('starRatio').value);
  var depth = parseFloat(document.getElementById('curveDepth').value);
  var g = parseFloat(document.getElementById('grout').value);
  var starColor = document.getElementById('starColor').value;
  var crossColor = document.getElementById('crossColor').value;
  var groutColor = document.getElementById('groutColor').value;
  var opacity = parseInt(document.getElementById('overlayOpacity').value) / 100;

  var R = S * starRatio / 2;

  // Clear with grout color
  ctx.fillStyle = groutColor;
  ctx.fillRect(0, 0, W, H);

  // Reference image (behind tiles)
  if (refImg && opacity > 0) {
    ctx.save();
    ctx.globalAlpha = opacity;
    var sc = parseFloat(document.getElementById('refScale').value);
    var ox = parseFloat(document.getElementById('refOffX').value);
    var oy = parseFloat(document.getElementById('refOffY').value);
    ctx.drawImage(refImg, ox, oy, refImg.width * sc, refImg.height * sc);
    ctx.restore();
  }

  var cols = Math.ceil(W / S) + 2;
  var rows = Math.ceil(H / S) + 2;
  var startX = S / 2;
  var startY = S / 2;

  // Draw all stars
  ctx.fillStyle = starColor;
  for (var row = -1; row < rows; row++) {
    for (var col = -1; col < cols; col++) {
      var sx = startX + col * S;
      var sy = startY + row * S;
      drawStar(sx, sy, R, depth, g);
      ctx.fill();
    }
  }

  // Draw all crosses
  ctx.fillStyle = crossColor;
  for (var row = -1; row < rows; row++) {
    for (var col = -1; col < cols; col++) {
      var sx = startX + col * S;
      var sy = startY + row * S;
      drawCross(sx + S/2, sy + S/2, S, R, depth, g);
      ctx.fill();
    }
  }

  // Reference image overlay (on top of tiles)
  if (refImg && opacity > 0) {
    ctx.save();
    ctx.globalAlpha = opacity;
    var sc = parseFloat(document.getElementById('refScale').value);
    var ox = parseFloat(document.getElementById('refOffX').value);
    var oy = parseFloat(document.getElementById('refOffY').value);
    ctx.drawImage(refImg, ox, oy, refImg.width * sc, refImg.height * sc);
    ctx.restore();
  }

  // Metrics
  var tipGap = S - 2 * R;
  document.getElementById('metrics').innerHTML =
    'Star tip-to-tip: ' + (2*R).toFixed(0) + 'px (' + (starRatio*100).toFixed(0) + '% of cell)<br>' +
    'Curve depth: ' + depth + ' (0=straight, 1=to center)<br>' +
    'Arm tip width: ' + (2*(S/2-R)+g).toFixed(1) + 'px<br>' +
    'Tip gap: ' + tipGap.toFixed(1) + 'px (grout: ' + g + 'px)';

  document.getElementById('statusBar').textContent =
    'Cell: ' + S + 'px | Star: ' + (2*R).toFixed(0) + 'px (' + (starRatio*100).toFixed(0) + '%) | depth=' + depth + ' | Grout: ' + g + 'px';
}

resize();
</script>
</body>
</html>
